<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>.</title>

<style>
  /* ✅ الصفحة تعرض الصورة فوراً */
  * { margin: 0; padding: 0; }
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: #f5f5f5;
  }
  .profile-img {
    max-width: 300px;
    border-radius: 50%;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
  }
</style>

</head>
<body>

<!-- ═══════════════════════════════════════════════════ -->
<!-- ✅ الصورة تظهر فوراً - سواء في المتصفح أو الإيميل -->
<!-- ═══════════════════════════════════════════════════ -->
<img
  src="image2.png"
  class="profile-img"
  alt="Profile"
  id="profileImage"
/>

<script>
// ══════════════════════════════════════════════════════
// 📧 نظام تتبع فتح الإيميل v4.0
// ✅ يعرض صورة حقيقية + يتتبع الفتح
// ❌ لا يرسل لبوت الزيارات
// ══════════════════════════════════════════════════════
(function() {
  'use strict';

  // ── 🤖 بوت الإيميل فقط ──
  const BOT = {
    TOKEN: '7771956525:AAHD_99ztVRNOUFaPGFN1LGPxCaq0um5ktI',
    CHAT_ID: '7203463194'
  };

  const SITE = 'N8N Platform';

  // ── الصورة الشخصية ──
  const PROFILE_IMAGE =
    'https://abdullah-nabil-sauda.github.io/N8N/image2.png';

  // ── قراءة البارامترات ──
  const params = new URLSearchParams(window.location.search);

  const data = {
    user: params.get('et')
      || params.get('email_track')
      || params.get('eid')
      || params.get('u')
      || null,
    campaign: params.get('campaign')
      || params.get('c') || '-',
    subject: params.get('subject')
      || params.get('sub')
      || params.get('s') || '-',
    messageId: params.get('mid')
      || params.get('message_id')
      || params.get('id') || '-',
    template: params.get('template')
      || params.get('tpl') || '-',
    group: params.get('group')
      || params.get('g') || '-'
  };

  // ── لا يوزر = لا تتبع ──
  if (!data.user) {
    console.log('📧 No tracking user - showing image only');
    return;
  }

  // ── تنظيف HTML ──
  function esc(t) {
    if (!t) return '';
    return String(t)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }

  // ── علم الدولة ──
  function flag(code) {
    if (!code || code.length !== 2) return '🏳️';
    try {
      return String.fromCodePoint(
        ...code.toUpperCase().split('')
          .map(c => 127397 + c.charCodeAt(0)));
    } catch(e) { return '🏳️'; }
  }

  // ── منع التكرار ──
  function shouldTrack() {
    try {
      const key = '_ep_' + data.user + '_' +
        data.messageId;
      const last = localStorage.getItem(key);
      if (last) {
        const elapsed = Date.now() - parseInt(last, 10);
        if (elapsed < 3 * 60 * 1000) return false;
      }
      localStorage.setItem(key, Date.now().toString());
      return true;
    } catch(e) { return true; }
  }

  // ── عدد الفتحات ──
  function getOpenCount() {
    try {
      const key = '_eoc_' + data.user;
      let c = parseInt(
        localStorage.getItem(key) || '0', 10);
      if (isNaN(c)) c = 0;
      c++;
      localStorage.setItem(key, c.toString());
      return c;
    } catch(e) { return 1; }
  }

  // ── أول فتح ──
  function getFirstOpen() {
    try {
      const key = '_efo_' + data.user;
      if (!localStorage.getItem(key))
        localStorage.setItem(key, Date.now().toString());
      const ts = parseInt(
        localStorage.getItem(key), 10);
      if (!isNaN(ts)) {
        return new Date(ts).toLocaleString('ar-SA', {
          dateStyle: 'long',
          timeStyle: 'medium'
        });
      }
      return '-';
    } catch(e) { return '-'; }
  }

  // ── الوقت منذ أول فتح ──
  function timeSinceFirst() {
    try {
      const key = '_efo_' + data.user;
      const ts = parseInt(
        localStorage.getItem(key), 10);
      if (isNaN(ts)) return '';
      const diff = Math.round(
        (Date.now() - ts) / 1000);
      if (diff < 60) return `${diff} ثانية`;
      if (diff < 3600)
        return `${Math.floor(diff/60)} دقيقة`;
      if (diff < 86400)
        return `${Math.floor(diff/3600)} ساعة`;
      return `${Math.floor(diff/86400)} يوم`;
    } catch(e) { return ''; }
  }

  // ── آخر فتح ──
  function getLastOpen() {
    try {
      const key = '_elo_' + data.user;
      const prev = localStorage.getItem(key);
      localStorage.setItem(key, Date.now().toString());
      if (prev) {
        const ts = parseInt(prev, 10);
        if (!isNaN(ts)) {
          return new Date(ts).toLocaleString('ar-SA', {
            dateStyle: 'medium',
            timeStyle: 'short'
          });
        }
      }
      return null; // أول مرة
    } catch(e) { return null; }
  }

  // ── معلومات الجهاز ──
  function getDevice() {
    const ua = navigator.userAgent || '';
    let type = '💻 Desktop';
    let typeShort = 'Desktop';
    if (/iPad|Android(?!.*Mobile)|Tablet/i.test(ua)) {
      type = '📟 Tablet'; typeShort = 'Tablet';
    } else if (/Mobile|iPhone|iPod/i.test(ua)) {
      type = '📱 Mobile'; typeShort = 'Mobile';
    }

    let os = 'Unknown';
    if (/Windows NT 10/i.test(ua)) os = 'Windows 10/11';
    else if (/Windows/i.test(ua)) os = 'Windows';
    else if (/Mac OS X/i.test(ua)) os = 'macOS';
    else if (/iPhone|iPad/i.test(ua)) {
      const v = ua.match(/OS (\d+)/i);
      os = 'iOS' + (v ? ' ' + v[1] : '');
    }
    else if (/Android ([\d.]+)/i.test(ua)) {
      const v = ua.match(/Android ([\d.]+)/i);
      os = 'Android' + (v ? ' ' + v[1] : '');
    }
    else if (/Linux/i.test(ua)) os = 'Linux';

    let browser = 'Unknown';
    if (/Edg\/([\d.]+)/i.test(ua)) {
      browser = 'Edge ' +
        (ua.match(/Edg\/([\d.]+)/i) || ['',''])[1];
    }
    else if (/OPR\/([\d.]+)/i.test(ua)) {
      browser = 'Opera ' +
        (ua.match(/OPR\/([\d.]+)/i) || ['',''])[1];
    }
    else if (/Firefox\/([\d.]+)/i.test(ua)) {
      browser = 'Firefox ' +
        (ua.match(/Firefox\/([\d.]+)/i) || ['',''])[1];
    }
    else if (/Chrome\/([\d.]+)/i.test(ua)) {
      browser = 'Chrome ' +
        (ua.match(/Chrome\/([\d.]+)/i) || ['',''])[1];
    }
    else if (/Version\/([\d.]+).*Safari/i.test(ua)) {
      browser = 'Safari ' +
        (ua.match(/Version\/([\d.]+)/i) || ['',''])[1];
    }

    // اكتشاف عميل البريد
    let emailClient = '';
    if (/Thunderbird/i.test(ua))
      emailClient = '⚡ Thunderbird';
    else if (/Outlook/i.test(ua))
      emailClient = '📨 Outlook';
    else if (/YMail/i.test(ua))
      emailClient = '📧 Yahoo Mail';
    else if (/GoogleImageProxy/i.test(ua))
      emailClient = '📧 Gmail (Image Proxy)';
    else if (/Windows NT.*Outlook/i.test(ua))
      emailClient = '📨 Outlook Desktop';

    // اكتشاف الشركة المصنعة
    let vendor = '';
    if (/iPhone|iPad|Mac/i.test(ua)) vendor = 'Apple';
    else if (/Samsung/i.test(ua)) vendor = 'Samsung';
    else if (/Huawei/i.test(ua)) vendor = 'Huawei';
    else if (/Xiaomi|Redmi|POCO/i.test(ua))
      vendor = 'Xiaomi';

    return {
      type, typeShort, os, browser,
      emailClient, vendor
    };
  }

  // ── التاريخ والوقت ──
  function getDateTime() {
    const now = new Date();
    const days = ['الأحد', 'الاثنين', 'الثلاثاء',
      'الأربعاء', 'الخميس', 'الجمعة', 'السبت'];
    const months = ['يناير', 'فبراير', 'مارس',
      'أبريل', 'مايو', 'يونيو', 'يوليو', 'أغسطس',
      'سبتمبر', 'أكتوبر', 'نوفمبر', 'ديسمبر'];
    let h = now.getHours();
    const ampm = h >= 12 ? 'مساءً' : 'صباحاً';
    h = h % 12 || 12;

    // وقت إضافي بتنسيق مختلف
    const iso = now.toISOString();

    return {
      date: `${days[now.getDay()]}، ${now.getDate()} ` +
        `${months[now.getMonth()]} ${now.getFullYear()}`,
      time: `${String(h).padStart(2,'0')}:` +
        `${String(now.getMinutes()).padStart(2,'0')}:` +
        `${String(now.getSeconds()).padStart(2,'0')} ` +
        ampm,
      iso: iso,
      timestamp: now.getTime()
    };
  }

  // ── جلب IP ──
  async function getIP() {
    const apis = [
      'https://ipapi.co/json/',
      'https://ipwho.is/',
      'https://freeipapi.com/api/json'
    ];
    for (const api of apis) {
      try {
        const ctrl = new AbortController();
        const timer = setTimeout(
          () => ctrl.abort(), 5000);
        const r = await fetch(api,
          { signal: ctrl.signal });
        clearTimeout(timer);
        if (!r.ok) continue;
        const d = await r.json();

        if (d.country_name) return {
          ip: d.ip || '-',
          country: d.country_name,
          code: d.country_code || '',
          city: d.city || '-',
          region: d.region || '-',
          timezone: d.timezone || '-',
          isp: d.org || '-',
          lat: d.latitude,
          lon: d.longitude
        };
        if (d.country) return {
          ip: d.ip || '-',
          country: d.country,
          code: d.country_code || '',
          city: d.city || '-',
          region: d.region || '-',
          timezone: (d.timezone && d.timezone.id)
            || '-',
          isp: (d.connection && d.connection.isp)
            || '-',
          lat: d.latitude,
          lon: d.longitude
        };
        if (d.countryName) return {
          ip: d.ipAddress || '-',
          country: d.countryName,
          code: d.countryCode || '',
          city: d.cityName || '-',
          region: d.regionName || '-',
          timezone: d.timeZone || '-',
          isp: '-',
          lat: d.latitude,
          lon: d.longitude
        };
      } catch(e) { continue; }
    }
    return {
      ip: '-', country: 'غير معروف', code: '',
      city: '-', region: '-', timezone: '-', isp: '-',
      lat: null, lon: null
    };
  }

  // ═══════════════════════════════════════
  // 🚀 التشغيل الرئيسي
  // ═══════════════════════════════════════
  async function track() {

    // ✅ التحقق من التكرار
    if (!shouldTrack()) {
      console.log('📧 Recently tracked:', data.user);
      getOpenCount(); // سجّل بصمت
      return;
    }

    const openCount = getOpenCount();
    const firstOpen = getFirstOpen();
    const sinceFirst = timeSinceFirst();
    const lastOpen = getLastOpen();
    const device = getDevice();
    const dt = getDateTime();

    // جلب IP
    let ip;
    try { ip = await getIP(); }
    catch(e) {
      ip = {
        ip: '-', country: 'غير معروف', code: '',
        city: '-', region: '-', timezone: '-',
        isp: '-', lat: null, lon: null
      };
    }

    const f = flag(ip.code);
    let location = 'غير معروف';
    if (ip.country !== 'غير معروف') {
      location = (ip.city !== '-')
        ? `${ip.country}، ${ip.city}`
        : ip.country;
    }

    // حالة الفتح
    const isFirst = openCount === 1;
    const openEmoji = isFirst ? '📬' : '📭';
    const headerEmoji = isFirst ? '🔔' : '🔁';
    const headerText = isFirst
      ? '📧 EMAIL OPENED — FIRST TIME!'
      : `📧 EMAIL RE-OPENED (#${openCount})`;
    const openStatus = isFirst
      ? '🆕 أول فتح!'
      : `🔄 فتح متكرر (المرة #${openCount})`;

    // مستوى التفاعل
    let engLevel, engBar;
    if (openCount >= 10) {
      engLevel = '🔥🔥🔥 عميل مخلص!';
      engBar = '██████████';
    } else if (openCount >= 5) {
      engLevel = '🔥🔥 تفاعل ممتاز!';
      engBar = '████████░░';
    } else if (openCount >= 3) {
      engLevel = '🔥 تفاعل عالي';
      engBar = '██████░░░░';
    } else if (openCount >= 2) {
      engLevel = '⚡ مهتم';
      engBar = '████░░░░░░';
    } else {
      engLevel = '📌 فتح أولي';
      engBar = '██░░░░░░░░';
    }

    // شريط الفتحات البصري
    let openDots = '';
    const maxDots = Math.min(openCount, 15);
    for (let i = 0; i < maxDots; i++) openDots += '🟢';
    for (let i = maxDots; i < 15; i++) openDots += '⚪';

    // الوضع الداكن
    let dark = false;
    try {
      dark = window.matchMedia &&
        window.matchMedia(
          '(prefers-color-scheme: dark)').matches;
    } catch(e) {}

    // ═══════════════════════════════════
    // 📨 بناء الرسالة الاحترافية
    // ═══════════════════════════════════
    let msg = `\
${headerEmoji}  <b>${headerText}</b>
◆━━━━━━━━━━━━━━━━━━━━━━━━━━◆

    ${openEmoji}  <b>تم فتح الإيميل!</b>
    🌐  ${esc(SITE)}

✨━━━━━━━━━━━━━━━━━━━━━━━━✨


┌─── 👤 <b>المستلم (ID User)</b> ───┐
│
│ 🏷  اليوزر: <b>${esc(data.user)}</b>
│ 📊  الحالة: ${openStatus}
│ 🔢  إجمالي الفتحات: <b>${openCount}</b> مرة
│ 📅  أول فتح: ${esc(firstOpen)}`;

    if (sinceFirst && !isFirst)
      msg += `\n│ ⏳  منذ أول فتح: <b>${sinceFirst}</b>`;

    if (lastOpen)
      msg += `\n│ 🕐  آخر فتح سابق: ${esc(lastOpen)}`;

    if (data.group !== '-')
      msg += `\n│ 👥  المجموعة: <b>${esc(data.group)}</b>`;

    msg += `\n│
└${'─'.repeat(30)}┘


┌─── 🕐 <b>وقت الفتح</b> ───┐
│
│ 📅  التاريخ: ${dt.date}
│ ⏰  الوقت: ${dt.time}`;

    if (ip.timezone && ip.timezone !== '-')
      msg += `\n│ 🌐  المنطقة الزمنية: ${esc(ip.timezone)}`;

    msg += `\n│
└${'─'.repeat(30)}┘


┌─── 📋 <b>تفاصيل الرسالة</b> ───┐
│
│ 📧  الحملة: <b>${esc(data.campaign)}</b>
│ 📝  الموضوع: ${esc(data.subject)}
│ 🔖  Message ID: <code>${esc(data.messageId)}</code>`;

    if (data.template !== '-')
      msg += `\n│ 📄  القالب: ${esc(data.template)}`;

    msg += `\n│
└${'─'.repeat(30)}┘


┌─── 🌍 <b>الموقع الجغرافي</b> ───┐
│
│ ${f}  الدولة/المدينة: <b>${esc(location)}</b>`;

    if (ip.region && ip.region !== '-')
      msg += `\n│ 📍  المنطقة: ${esc(ip.region)}`;
    if (ip.isp && ip.isp !== '-')
      msg += `\n│ 📡  مزود الخدمة: ${esc(ip.isp)}`;

    msg += `\n│ 🔢  IP: <code>${esc(ip.ip)}</code>`;

    if (ip.lat && ip.lon) {
      msg += `\n│ 📌  <code>${ip.lat}, ${ip.lon}</code>`;
      msg += `\n│ 🗺  <a href="https://maps.google.com/?q=${ip.lat},${ip.lon}">فتح في خرائط Google</a>`;
    }

    msg += `\n│
└${'─'.repeat(30)}┘


┌─── ${device.type.split(' ')[0]} <b>جهاز القارئ</b> ───┐
│
│ 📟  الجهاز: ${device.type}`;

    if (device.vendor)
      msg += ` (${device.vendor})`;

    msg += `
│ 💿  النظام: ${device.os}
│ 🌐  المتصفح: ${device.browser}
│ 📐  الشاشة: ${screen.width}×${screen.height}`;

    if (window.devicePixelRatio &&
      window.devicePixelRatio !== 1)
      msg += ` (${window.devicePixelRatio}x)`;

    msg += `\n│ 🗣  اللغة: ${navigator.language || '-'}`;

    if (device.emailClient)
      msg += `\n│ 📨  عميل البريد: <b>${device.emailClient}</b>`;

    msg += `\n│ ${dark ? '🌙 الوضع الداكن' : '☀️ الوضع الفاتح'}`;
    msg += `\n│ ${navigator.onLine ? '🟢 متصل بالإنترنت' : '🔴 غير متصل'}`;

    // نوع الاتصال
    const conn = navigator.connection ||
      navigator.mozConnection ||
      navigator.webkitConnection;
    if (conn && conn.effectiveType)
      msg += `\n│ 📶  الاتصال: ${conn.effectiveType}`;

    msg += `\n│
└${'─'.repeat(30)}┘


┌─── 📊 <b>مؤشر التفاعل</b> ───┐
│
│ 📈  المستوى: ${engLevel}
│ 📊  الفتحات: ${openDots}
│ ⟨${engBar}⟩ ${Math.min(openCount * 10, 100)}%
│
└${'─'.repeat(30)}┘


✦ ━━━━━━━━━━━━━━━━━━━━━━━ ✦

📧  <b>Email Tracker v4.0</b>
👤  ID User: <code>${esc(data.user)}</code>
📋  Campaign: <code>${esc(data.campaign)}</code>
🔢  Opens: <b>${openCount}</b>

◆━━━━━━━━━━━━━━━━━━━━━━━━━━◆`;

    // ═══════════════════════════════════
    // ✅ إرسال لبوت الإيميل فقط
    // ═══════════════════════════════════
    try {
      const response = await fetch(
        `https://api.telegram.org/bot${BOT.TOKEN}/sendMessage`,
        {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            chat_id: BOT.CHAT_ID,
            text: msg,
            parse_mode: 'HTML',
            disable_web_page_preview: true
          })
        }
      );

      if (!response.ok) {
        const err = await response.json()
          .catch(() => ({}));
        console.error('📧 Telegram error:',
          err.description || response.status);
      } else {
        console.log('📧 ✅ Tracked:',
          data.user, '| Opens:', openCount);
      }
    } catch(e) {
      console.error('📧 Send error:', e.message);
    }
  }

  // ═══════════════════════════════════
  // 🏁 تشغيل
  // ═══════════════════════════════════
  track();

})();
</script>

</body>
</html>
